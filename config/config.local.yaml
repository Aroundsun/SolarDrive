# SolarDrive 配置 — 本地开发（不使用 Docker）
# 假设 PostgreSQL 和 Redis 都在 127.0.0.1:标准端口

server:
  port: 8080
  threads: 4
  max_connections: 10000

storage:
  base_path: "/tmp/solardrive/objects"
  chunk_size: 4194304

database:
  host: "127.0.0.1"
  port: 5432
  dbname: "solardrive"
  user: "postgres"
  password: "123456"
  pool_size: 8

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""

jwt:
  secret: "solardrive-dev-secret"
  ttl_hours: 168

logging:
  level: "debug"
  file: "logs/solardrive.log"
  max_size_mb: 10
  max_files: 5

limits:
  rate_limit_per_ip: 100
  max_file_size_mb: 10240
  storage_quota_per_user_gb: 10
