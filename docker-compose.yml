services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: solardrive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solardrive"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solarnet

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solarnet

  solardrive:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - objects:/tmp/solardrive/objects
      - logs:/app/logs
    environment:
      TZ: Asia/Shanghai
      SOLAR_CONFIG: config/config.yaml
      PGHOST: postgres
      REDIS_HOST: redis
      SOLAR_REDIS_HOST: redis
      SOLAR_JWT_SECRET: ${SOLAR_JWT_SECRET:-dev-only-change-in-production}
      SOLAR_DB: >-
        host=postgres port=5432 dbname=solardrive user=postgres
        password=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solarnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  objects:
  logs:

networks:
  solarnet: