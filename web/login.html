<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolarDrive · 登录</title>
  <link rel="stylesheet" href="/style.css?v=9">
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <div class="app app-auth-page" id="app">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">☀</div>
        <div>
          <h1>SolarDrive</h1>
          <p class="subtitle">登录或注册以管理你的云盘</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-pill" id="status-pill">
          <span class="status-dot"></span>
          <span id="status-text">连接中…</span>
        </div>
      </div>
    </header>

    <section class="card auth-card auth-page-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">登录</button>
        <button type="button" class="auth-tab" data-tab="register">注册</button>
      </div>

      <form class="auth-form" id="login-form">
        <label class="field">
          <span>用户名</span>
          <input type="text" id="login-username" name="username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <form class="auth-form" id="register-form" hidden>
        <label class="field">
          <span>用户名</span>
          <input type="text" id="register-username" name="username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" id="register-password" name="password" autocomplete="new-password" required>
        </label>
        <button type="submit" class="btn btn-primary btn-block">注册并登录</button>
      </form>
    </section>

    <footer class="footer auth-page-footer">
      <a href="/receive.html" class="footer-link">接收分享</a>
      <a href="/metrics.html" class="footer-link">监控面板</a>
    </footer>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <script src="/session.js?v=2"></script>
  <script src="/ui.js?v=1"></script>
  <script src="/api.js?v=1"></script>
  <script src="/auth.js?v=2"></script>
</body>
</html>
