name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Build & ctest
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            git \
            libssl-dev \
            libpq-dev \
            libpqxx-dev \
            libhiredis-dev \
            libyaml-cpp-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev \
            libgtest-dev

      - name: Configure
        run: cmake -S . -B build -DSOLAR_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: cd build && ctest --output-on-failure
