# =============================================================
# SolarDrive — Nginx 反向代理配置
# 将 HTTPS :443 → 转发到 SolarDrive :8080
# 使用前：sudo ln -s /app/deploy/nginx.conf /etc/nginx/sites-enabled/solardrive
# =============================================================

upstream solardrive_backend {
    # SolarDrive 服务实例（多实例时在此添加）
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;
    # 自动跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ===== TLS 证书（用 certbot 获取）=====
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ===== TLS 安全配置 =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== 大文件上传支持（最大 10GB）=====
    client_max_body_size 10240m;
    client_body_buffer_size 128k;
    client_body_timeout 300s;

    # ===== 代理到 SolarDrive =====
    location / {
        proxy_pass http://solardrive_backend;
        proxy_http_version 1.1;

        # 透传客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接支持（SolarDrive 支持 keep-alive）
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ===== 静态资源（如果有前端页面）=====
    location /static/ {
        root /app/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== 监控端点（允许内网访问）=====
    location /metrics {
        proxy_pass http://solardrive_backend;
        proxy_http_version 1.1;
        # 限制为内网访问
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ===== 日志 =====
    access_log /var/log/nginx/solardrive_access.log;
    error_log  /var/log/nginx/solardrive_error.log warn;
}
